<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlanner | Katre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .grid-item {
            transition: transform 0.2s ease;
        }

        .grid-item:hover {
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 min-h-screen pb-10 text-slate-900 dark:text-slate-100">

    <nav
        class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 p-4 mb-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-black text-indigo-600 italic tracking-tighter">KATRE</h1>
                <button onclick="window.clearWeeklyPlan()"
                    class="hidden md:block text-[10px] font-bold bg-red-100 dark:bg-red-900/30 text-red-600 px-3 py-1 rounded-full hover:bg-red-200 transition">
                    Haftayı Sıfırla
                </button>
            </div>

            <div class="flex items-center gap-2">
                <button id="notifToggle"
                    class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 transition-all hover:scale-105 active:scale-95">
                    <span id="notifIcon">🔔</span>
                </button>

                <button id="themeToggle"
                    class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 transition-all">
                    <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
                </button>

                <button onclick="document.getElementById('modal').classList.remove('hidden')"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 dark:shadow-none transition active:scale-95">
                    + Yeni Ders
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <div id="weeklyGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-7 gap-4 mb-10"></div>

        <div
            class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
            <div
                class="p-5 border-b dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                <span class="font-bold text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest">Haftalık
                    Akış</span>
                <span id="lessonCount"
                    class="text-xs bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 px-3 py-1 rounded-full font-bold">0
                    Ders</span>
            </div>
            <div id="fullList" class="divide-y divide-slate-100 dark:divide-slate-800"></div>
        </div>
    </main>

    <div id="modal"
        class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[100] p-4">
        <div
            class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-md border dark:border-slate-800 transform transition-all shadow-2xl">
            <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center">
                <h3 class="text-xl font-bold dark:text-white">Ders Planla</h3>
                <button onclick="document.getElementById('modal').classList.add('hidden')"
                    class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <div class="p-8 space-y-4">
                <input type="text" id="studentName" placeholder="Öğrenci / Konu Adı"
                    class="w-full bg-slate-50 dark:bg-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
                <select id="lessonDay"
                    class="w-full bg-slate-50 dark:bg-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
                    <option>Pazartesi</option>
                    <option>Salı</option>
                    <option>Çarşamba</option>
                    <option>Perşembe</option>
                    <option>Cuma</option>
                    <option>Cumartesi</option>
                    <option>Pazar</option>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="time" id="startTime"
                        class="w-full bg-slate-50 dark:bg-slate-800 rounded-2xl p-4 outline-none dark:text-white">
                    <input type="time" id="endTime"
                        class="w-full bg-slate-50 dark:bg-slate-800 rounded-2xl p-4 outline-none dark:text-white">
                </div>
                <button id="saveBtn"
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition">Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApzgPFdLCsjFrKSPCG3mP-L5Z0KSmULJY",
            authDomain: "katrederstakip.firebaseapp.com",
            projectId: "katrederstakip",
            storageBucket: "katrederstakip.firebasestorage.app",
            messagingSenderId: "730317351089",
            appId: "1:730317351089:web:be53ae12adc8fd5bcfda90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const lessonCol = collection(db, "lessons");
        const dayOrder = { "Pazartesi": 1, "Salı": 2, "Çarşamba": 3, "Perşembe": 4, "Cuma": 5, "Cumartesi": 6, "Pazar": 7 };

        // --- BİLDİRİM SİSTEMİ ---
        let notificationsEnabled = localStorage.getItem('notifications') === 'true';
        let notifiedLessons = new Set();

        const notifBtn = document.getElementById('notifToggle');
        const notifIcon = document.getElementById('notifIcon');

        const updateNotifUI = () => {
            notifIcon.innerText = notificationsEnabled ? '🔔' : '🔕';
            notifBtn.className = notificationsEnabled
                ? "p-2 rounded-xl bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 transition-all"
                : "p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 transition-all";
        };
        updateNotifUI();

        notifBtn.onclick = async () => {
            if (!notificationsEnabled) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    notificationsEnabled = true;
                } else {
                    alert("Lütfen tarayıcı ayarlarından bildirimlere izin verin.");
                    return;
                }
            } else {
                notificationsEnabled = false;
            }
            localStorage.setItem('notifications', notificationsEnabled);
            updateNotifUI();
        };

        const checkLessons = (lessons) => {
            if (!notificationsEnabled || Notification.permission !== "granted") return;

            const now = new Date();
            const dayNames = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];
            const currentDay = dayNames[now.getDay()];
            const currentTotalMins = now.getHours() * 60 + now.getMinutes();

            lessons.forEach(l => {
                if (l.day === currentDay) {
                    const [h, m] = l.start.split(':').map(Number);
                    const lessonTotalMins = h * 60 + m;
                    const diff = lessonTotalMins - currentTotalMins;

                    // Tam 60 dakika kala ve daha önce bu ders için bildirim atılmadıysa
                    if (diff === 60 && !notifiedLessons.has(l.id)) {
                        new Notification("Ders Hatırlatıcı 📚", {
                            body: `${l.name} dersi 1 saat sonra (${l.start}) başlayacak.`,
                            icon: "https://cdn-icons-png.flaticon.com/512/2997/2997300.png"
                        });
                        notifiedLessons.add(l.id);
                    }
                }
            });

            if (now.getHours() === 0 && now.getMinutes() === 0) notifiedLessons.clear();
        };

        // --- VERİ DİNLEME VE RENDER ---
        onSnapshot(lessonCol, (snapshot) => {
            let lessons = [];
            snapshot.forEach(doc => lessons.push({ id: doc.id, ...doc.data() }));

            lessons.sort((a, b) => {
                if (dayOrder[a.day] !== dayOrder[b.day]) return dayOrder[a.day] - dayOrder[b.day];
                return a.start.localeCompare(b.start);
            });

            // Bildirim kontrolünü başlat/güncelle
            if (window.notifTimer) clearInterval(window.notifTimer);
            window.notifTimer = setInterval(() => checkLessons(lessons), 60000);
            checkLessons(lessons); // Anlık kontrol

            // UI Render (Haftalık Grid)
            const days = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi', 'Pazar'];
            document.getElementById('weeklyGrid').innerHTML = days.map(day => {
                const dayLessons = lessons.filter(l => l.day === day);
                return `
                    <div class="bg-white dark:bg-slate-900 rounded-2xl border dark:border-slate-800 overflow-hidden flex flex-col grid-item shadow-sm">
                        <div class="bg-indigo-50 dark:bg-indigo-900/20 p-2 text-[10px] font-black text-indigo-600 uppercase text-center border-b dark:border-slate-800">${day}</div>
                        <div class="p-2 space-y-2 min-h-[80px]">
                            ${dayLessons.map(l => `
                                <div class="bg-slate-50 dark:bg-slate-800 p-2 rounded-xl border dark:border-slate-700 relative group">
                                    <div class="text-[9px] font-bold text-slate-400">${l.start}</div>
                                    <div class="text-[11px] font-bold truncate">${l.name}</div>
                                    <button onclick="window.deleteItem('${l.id}')" class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 text-red-400">✕</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }).join('');

            // Alt Liste Render
            document.getElementById('lessonCount').innerText = `${lessons.length} Ders`;
            document.getElementById('fullList').innerHTML = lessons.map(l => `
                <div class="p-4 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/40 transition">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">${l.start}</div>
                        <div>
                            <div class="text-slate-900 dark:text-white font-bold text-sm">${l.name}</div>
                            <div class="text-slate-400 text-[10px] uppercase font-bold">${l.day}</div>
                        </div>
                    </div>
                    <button onclick="window.deleteItem('${l.id}')" class="text-slate-300 hover:text-red-500 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('') || '<div class="p-10 text-center text-slate-400 italic">Program boş.</div>';
        });

        // Diğer Fonksiyonlar
        document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('studentName').value;
            const day = document.getElementById('lessonDay').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (!name || !start || !end) return alert("Bilgileri doldur!");
            await addDoc(lessonCol, { name, day, start, end });
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('studentName').value = '';
        };

        window.deleteItem = async (id) => {
            if (confirm("Silinsin mi?")) await deleteDoc(doc(db, "lessons", id));
        };

        window.clearWeeklyPlan = async () => {
            if (confirm("Tüm haftayı silmek istediğinize emin misiniz?")) {
                const snap = await getDocs(lessonCol);
                snap.forEach(async (d) => await deleteDoc(doc(db, "lessons", d.id)));
            }
        };
    </script>
</body>

</html>
