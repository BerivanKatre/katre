<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Randevu Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white border-b p-4 mb-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 italic">Ders Planlayıcı</h1>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold transition">
                + Yeni Ders Ekle
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <div id="weeklyGrid" class="grid grid-cols-1 md:grid-cols-7 gap-3 mb-8">
            </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 border-b bg-slate-50 font-bold text-slate-700 text-sm italic">
                Tüm Randevular
            </div>
            <div id="fullList" class="divide-y divide-slate-100">
                </div>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="p-5 border-b font-bold text-slate-800">Ders Detayları</div>
            <div class="p-5 space-y-4">
                <input type="text" id="studentName" placeholder="Öğrenci Adı" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500">
                
                <select id="lessonDay" class="w-full border rounded-lg p-3 outline-none">
                    <option>Pazartesi</option><option>Salı</option><option>Çarşamba</option>
                    <option>Perşembe</option><option>Cuma</option><option>Cumartesi</option><option>Pazar</option>
                </select>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Başlangıç</label>
                        <input type="time" id="startTime" class="w-full border rounded-lg p-2 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Bitiş</label>
                        <input type="time" id="endTime" class="w-full border rounded-lg p-2 outline-none">
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal()" class="flex-1 text-slate-400 font-medium">İptal</button>
                    <button onclick="saveData()" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const days = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi', 'Pazar'];
        let db = JSON.parse(localStorage.getItem('edu_planner_v3')) || [];

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveData() {
            const name = document.getElementById('studentName').value;
            const day = document.getElementById('lessonDay').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;

            if(!name || !start || !end) return alert("Lütfen eksik alan bırakmayın.");

            db.push({ id: Date.now(), name, day, start, end });
            localStorage.setItem('edu_planner_v3', JSON.stringify(db));
            render();
            closeModal();
            document.getElementById('studentName').value = '';
        }

        function deleteItem(id) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('edu_planner_v3', JSON.stringify(db));
            render();
        }

        function render() {
            // Haftalık Grid
            let gridHTML = '';
            days.forEach(day => {
                const dayLessons = db.filter(l => l.day === day).sort((a,b) => a.start.localeCompare(b.start));
                gridHTML += `
                    <div class="bg-white rounded-lg border border-slate-200 overflow-hidden shadow-sm min-h-[120px]">
                        <div class="bg-slate-100 p-2 text-center font-bold text-[11px] text-slate-600 border-b">${day}</div>
                        <div class="p-2 space-y-2 text-[11px]">
                            ${dayLessons.map(l => `
                                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-2 rounded">
                                    <div class="font-bold text-indigo-800">${l.start} - ${l.end}</div>
                                    <div class="text-slate-700 truncate">${l.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            document.getElementById('weeklyGrid').innerHTML = gridHTML;

            // Liste Görünümü
            const listHTML = db.map(l => `
                <div class="p-4 flex items-center justify-between hover:bg-slate-50">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-600 text-white px-3 py-1 rounded text-xs font-bold">${l.start} - ${l.end}</div>
                        <div>
                            <h4 class="font-bold text-slate-800 text-sm">${l.name}</h4>
                            <p class="text-[10px] text-slate-400 uppercase font-bold">${l.day}</p>
                        </div>
                    </div>
                    <button onclick="deleteItem(${l.id})" class="text-slate-300 hover:text-red-500 text-xs">SİL</button>
                </div>
            `).join('');
            document.getElementById('fullList').innerHTML = listHTML || '<p class="p-10 text-center text-slate-300">Ders eklenmedi.</p>';
        }

        render();
    </script>
</body>
</html>
